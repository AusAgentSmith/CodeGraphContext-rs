version: '3.8'

services:
  codegraphcontext:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codegraphcontext
    volumes:
      # Mount your code directory here
      - ./:/workspace
      # Persist config
      - cgc-data:/root/.codegraphcontext
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codegraph123}
    depends_on:
      - neo4j
    stdin_open: true
    tty: true
    command: bash
    networks:
      - cgc-network

  neo4j:
    image: neo4j:5-community
    container_name: cgc-neo4j
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-codegraph123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - cgc-network

volumes:
  cgc-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local

networks:
  cgc-network:
    driver: bridge
